<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Atualizar Equipamento</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    </head>
    <body>
        <div class="container mt-5">
            <h2>Atualizar Equipamento</h2>
            <form th:action="@{/Equip}" th:object="${equipamento}" method="POST">

                <input type="hidden"th:field="*{id}"/>

                <div class="form-group">
                    <label>Nome do Equipamento</label>
                    <input type="text" th:field="*{nome}" class="form-control" required />
                </div>

                <div class="form-group">
                    <label>Descrição</label>
                    <input type="text" th:field="*{descricao}" class="form-control" />
                </div>

                <div class="form-group">
                    <label>Quantidade</label>
                    <input type="number" th:field="*{quantidade}" class="form-control" min="0" />
                </div>

                <div class="form-group">
                    <label>Preço</label>
                    <input type="number" step="0.01" th:field="*{preco}" class="form-control" min="0" />
                </div>

                <div class="form-group">
                    <label>Categoria</label>
                    <select th:field="*{categoria.id}" class="form-control" required>
                        <option value="">-- Selecione uma categoria --</option>
                        <option th:each="cat : ${categorias}"
                                th:value="${cat.id}"
                                th:text="${cat.nome}">
                        </option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Atualizar</button>
                <a th:href="@{/ListarEquip}" class="btn btn-secondary ml-2">Cancelar</a>
            </form>

        </div>
    </body>
</html>
