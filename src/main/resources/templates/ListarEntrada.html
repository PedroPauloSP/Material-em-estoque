<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Lista de Equipamento</title>
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous"> 

    </head>
    <body
         <div class="container my-2">
            <h1>Lista de Entrada</h1>
            <a th:href="@{/criarEntrada}"class="btn btn-primary" >Cadastrar Entrada</a>
              <table border="1" class="table table-striped table-responsive-md"> 
                <thead>
                    
                        
                    <tr>
                        <th>id</th>
                        <th>Razão Social</th>
                        <th>CNPJ</th>
                        <th>Equipamento</th>
                        <th>Categoria</th>
                        <th>Quantidade</th>
                        <th>Data</th>
                        <th>Opções</th>
                    </tr>
                </thead>
                                            
<tr th:each="entradas : ${ListarEntrada}">
    <td th:text="${entradas.id}"></td>
    <td th:text="${entradas.fornecedor.nome}"></td>
    <td th:text="${entradas.fornecedor.cnpj}"></td>
    <td th:text="${entradas.equipamento.nome}"></td>
    <td th:text="${entradas.categoria.nome}"></td>
    <td th:text="${entradas.quantidade}"></td>
    <td th:text="${#temporals.format(entradas.data,'dd/MM/yyyy')}"></td>

    <td>
        <a th:href="@{/Menu}" class="btn btn-secondary btn-sm">Menu</a>

        <a th:href="@{/atualizarEntrada/{id}(id=${entradas.id})}"
           class="btn btn-primary btn-sm">
           Atualizar
        </a>

        <a th:href="@{/deletarEntrada/{id}(id=${entradas.id})}"
           class="btn btn-danger btn-sm">
           Deletar
        </a>
    </td>
</tr>
</tbody>
  </table>
        </div>
    </body>    
</html>
