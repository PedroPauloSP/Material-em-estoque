<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Cadastro de Equipamento</title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
</head>

<body class="container mt-4">

<h1>Cadastro de Equipamento</h1>

<form th:action="@{/Equip}" th:object="${equipamento}" method="POST">

    <input type="hidden" th:field="*{id}"/>

    <div class="form-group">
        <label>Nome:</label>
        <input type="text" th:field="*{nome}" class="form-control"required/>
    </div>
    
     <div class =" form-group">
    <label>Categoria</label>
    <select th:field="*{categoria}" class="form-control"required>
    <option th:each="cat : ${categorias}"
            th:value="${cat.id}"
            th:text="${cat.nome}">
    </option>
    </select>
    </div>
   
    <div class="form-group">
        <label>Descrição:</label>
        <input type="text" th:field="*{descricao}" class="form-control"required/>
    </div>
    
    <button type="submit" class="btn btn-primary">Cadastrar</button>
    <a class="btn btn-secondary" th:href="@{/equipamentos}">Voltar</a>
</form>

</body>
</html>
