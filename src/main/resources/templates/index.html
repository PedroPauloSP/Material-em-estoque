<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
         <meta charset="UTF-8">
        <title>Lista de categoria</title>
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous"> 
        
    </head>
    <body>
        <div class="container my-2">
        <h1>Lista de Categoria</h1>
        <a th:href="@{/Menu} "class="btn btn-primary">Menu</a>
        <a th:href="@{/criarCategoria}"class="btn btn-primary" >
        <i class="fas fa-plus"></i>Nova categoria
        </a>
           <table border="1" class="table table-striped table-hover" style="width:400px; height:20px;"> 
             <thead class="thead-dark">
                 <tr>
                     <th>ID</th>
                     <th>NOME</th>
                     <th>OPÇÕES</th>
                     
                 </tr>
             </thead>
             <tbody>
                 <tr th:each="categoria : ${listarCategoria}">
                     <td th:text="${categoria?.id ?:'-'}"></td>
                     <td th:text="${categoria?.nome ?:'-'}"></td> 
                     <td>
                       <div class="btn-group btn-group-sm" role="group">
                                <a th:href="@{/atualizarCategoria/{id}(id=${categoria.id})}" 
                                   class="btn btn-outline-primary" title="Editar"
                                   onclick="return confirm('Deseja editar?')">
                                    
                                    <i class="fas fa-edit"></i>
                                </a>
                                <a th:href="@{/deletarCategoria/{id} (id=${categoria.id})}" 
                                   class="btn btn-outline-danger" title="Deletar"
                                   onclick="return confirm('Confirma exclusão?')">
                                    <i class="fas fa-trash"></i>
                                </a>
                            </div>  
                     </td>   
                 </tr>
             </tbody>
         </table>
        </div>
         <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/js/all.min.js"></script>
</body>   
    </body>    
</html>
