<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Cadastro de Entrada</title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
</head>

<body class="container mt-4">

<h2 th:text="${entrada.id == null} ? 'Nova Entrada' : 'Editar Entrada'"></h2>

<form th:action="@{/cadastrarEntrada}" th:object="${entrada}" method="post">

    <input type="hidden" th:field="*{id}">

    <!-- FORNECEDOR -->
    <label>Fornecedor:</label>
    <select th:field="*{fornecedor}" class="form-control">
        <option value="">Escolha...</option>
        <option th:each="forne : ${fornecedores}"
                th:value="${forne.idfornecedor}"
                th:text="${forne.nome + ' (' + forne.cnpj + ')'}">
        </option>
    </select>
     <select th:field="*{fornecedor}" class="form-control">
        <option value="">Escolha...</option>
        <option th:each="forne:${fornecedor}"
                th:value="${forne.cnpj}"
             
        </option>
    </select>


    <!-- EQUIPAMENTO -->
    <label class="mt-3">Equipamento:</label>
    <select th:field="*{equipamento}" class="form-control">
        <option value="">Escolha...</option>
        <option th:each="equip : ${equipamentos}"
                th:value="${equip.id_equipamento}"
                th:text="${equip.nome}">
        </option>
    </select>


    <!-- CATEGORIA -->
    <label class="mt-3">Categoria:</label>
    <select th:field="*{categoria}" class="form-control">
        <option value="">Escolha...</option>
        <option th:each="cat : ${categorias}"
                th:value="${cat.id_categoria}"
                th:text="${cat.nome}">
        </option>
    </select>


    <!-- QUANTIDADE -->
    <label class="mt-3">Quantidade:</label>
    <input type="number" th:field="*{quantidade}" class="form-control"/>


    <!-- DATA -->
    <label class="mt-3">Data:</label>
    <input type="date" th:field="*{data}" class="form-control"/>


    <button class="btn btn-primary mt-4"
            th:text="${entrada.id == null} ? 'Cadastrar' : 'Atualizar'">
    </button>
<a th:href="@{/ListarEntrada}" class="btn btn-secondary mt-4">Cancelar</a>
</form>

</body>
</html>
