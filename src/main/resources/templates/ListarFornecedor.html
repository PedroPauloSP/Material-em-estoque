<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Lista de Fornecedor</title>
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous"> 

    </head>
    <body>
        <div class="container my-4">
          <div class="d-flex justify-content-between align-items-center mb-4"> </div> 
            <h2>Lista de Fornecedores</h2>
             <a th:href="@{/Menu}"class="btn btn-primary" >Menu</a>
             <a th:href="@{/fornecedores/novo}"class="btn btn-primary">
             <i class="fas fa-plus"></i>Novo Fornecedor
        </a>
          
              <table border="1" class="table table-striped table-hover"> 
                <thead class="thead-dark">
                    <tr>
                       
                        <th>ID</th>
                        <th>Razão Social</th>
                        <th>CNPJ</th>
                        <th>Telefone</th>
                        <th>E-mail</th><!-- comment -->
                         <th>Endereço</th><!-- comment -->
                        <th>Ações</th>
                    </tr>


                </thead>
                <tbody>
                    <tr th:each="forne : ${listarFornecedores}">
                        <td th:text="${forne.id}"></td>
                        <td th:text="${forne.nome}"></td>
                        <td th:text="${forne.cnpj}"></td>
                        <td th:text="${forne.telefone}"></td>
                        <td th:text="${forne.email}"></td>
                        <td th:text="${forne.endereco}"></td>
                  
                        <td > 
                           
                            <a th:href="@{/fornecedores/editar/{id}(id=${forne.id})}"
                               class="btn btn-outline-primary"title="Editar">
                                <i class="fas fa-edit"></i>
                            </a>
                            <a th:href="@{/fornecedores/deletar/{id}(id=${forne.id})}"
                               class="btn btn-outline-danger" title="Deletar"
                               onclick="return confirm('Confirma exclusão?')">
                                <i class="fas fa-trash"></i>
                            </a> 
                         </td>
                        
                       
                    </tr>
                </tbody>
            </table>
        </div>
        
         <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/js/all.min.js"></script>
               
    </body>    
</html>
