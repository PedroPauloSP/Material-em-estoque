<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Atualizar Categoria</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    </head>
    <body>
        <div class="container mt-5">
            <h2>Atualizar Categoria</h2>
            <form action="#" th:action="@{/adicionar}" th:object="${categoria}" method="POST">
                <div class="form-group">
                    <!--<label>ID</label>
                    <input type="text"th:field="*{id}"/>-->
                    <label for="nome">Nome da Categoria:</label>
                    <input type="text" th:field="*{nome}" class="form-control" /><!-- comment -->

                    <div class="btn-group btn-group-sm" role="group">
                        <button type="submit" class="btn btn-outline-primary"><i class="fas fa-edit"></i></button>
                        <!--<a th:href="@{/}" class="btn btn-secondary ml-2">Cancelar</a>-->
                        <a th:href="@{/}" class="btn btn-outline-primary ml-2"> <i class="btn-sm">Cancelar</i></a>                     
                    </div>      
            </form>

        </div>
        <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/js/all.min.js"></script>
    </body>
</html>
