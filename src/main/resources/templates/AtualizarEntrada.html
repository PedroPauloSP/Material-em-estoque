<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Atualizar Entrada</title>
    <meta charset="utf-8">
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
</head>

<body>
<div class="container mt-5">

<h2>Atualizar Entrada</h2>

<form th:action="@{/cadastrarEntrada}" th:object="${entrada}" method="post">

<input type="hidden" th:field="*{id}"/>


<!-- FORNECEDOR -->
<label>Fornecedor:</label>
<select th:field="*{fornecedor}" class="form-control">
    <option value="">Escolha...</option>
    <option th:each="f : ${fornecedores}"
            th:value="${f.idfornecedor}"
            th:text="${f.nome + ' (' + f.cnpj + ')'}">
    </option>
</select>


<!-- EQUIPAMENTO -->
<label class="mt-3">Equipamento:</label>
<select th:field="*{equipamento}" class="form-control">
    <option value="">Escolha...</option>
    <option th:each="e : ${equipamentos}"
            th:value="${e.id_equipamento}"
            th:text="${e.nome}">
    </option>
</select>


<!-- CATEGORIA -->
<label class="mt-3">Categoria:</label>
<select th:field="*{categoria}" class="form-control">
    <option value="">Escolha...</option>
    <option th:each="c : ${categorias}"
            th:value="${c.id_categoria}"
            th:text="${c.nome}">
    </option>
</select>


<!-- QUANTIDADE -->
<label class="mt-3">Quantidade:</label>
<input type="number" th:field="*{quantidade}" class="form-control"/>


<!-- DATA -->
<label class="mt-3">Data:</label>
<input type="date" th:field="*{data}" 
th:readonly="${entrada.id !=null}"class="form-control"/>
<span th:errors="*{data}" class="text-danger"></span>


<button class="btn btn-primary mt-4">Atualizar</button>
<a th:href="@{/ListarEntrada}" class="btn btn-secondary mt-4">Cancelar</a>

</form>
</div>
</body>
</html>
