<!DOCTYPE html>

<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Lista de Clientes</title>
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

    </head>
    <body>
        <div class="container my-4">
             <div class="d-flex justify-content-between align-items-center mb-4"></div> 
            <h1>Lista de Clientes</h1>
            <a th:href="@{/Menu}" class="btn btn-primary" ></i>Menu</a>
             <a th:href="@{novo}"
                class="btn btn-primary">
                 <i class="fas fa-plus"></i>Novo Cliente
             </a>
                      
              <table class="table table-striped table-bordered"> 
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Razão Social</th>
                        <th>CNPJ</th>
                        <th>Telefone</th>
                        <th>E-mail</th><!-- comment -->
                        <th>Endereço</th><!-- comment -->
                         <th>Oções</th>
                    </tr>


                </thead>
                <tbody>
                    <tr th:each="cliente : ${listarClientes}">
                        <td th:text="${cliente.id}"></td>
                        <td th:text="${cliente.nome}"></td>
                        <td th:text="${cliente.cnpj}"></td>
                        <td th:text="${cliente.telefone}"></td>
                        <td th:text="${cliente.email}"></td>
                        <td th:text="${cliente.endereco}"></td>
                  
                        <td > 
                            <div class="btn-group btn-group-sm" role="group">
                            <a th:href="@{/editar/{id}(id=${cliente.id})}"
                               class="btn btn-outline-primary" title="Editar">
                               <i class ="fas fa-edit"></i>
                            </a>
                         
                            <a th:href="@{/deletar/{id}(id=${cliente.id})}"
                               class="btn btn-outline-danger" title="Deletar"
                               onclick="return confirm ('Confirma exclusão?')">
                               <i class="fas fa-trash"></i>
                            </a>
                              
                               </div>
                         </td>

                    </tr>
                </tbody>
            </table>
        </div>
         <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/js/all.min.js"></script>

    </body>    
</html>
