<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Cadastro de Cliente</title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
</head>

<body class="container">

<h1>CLIENTE</h1>
<!--<h1 th:text="*{idfornecedor} == null ? 'Cadastrar Fornecedor' : 'Editar Fornecedor'"></h1-->
<form th:action="@{/salvar}"
      th:object="${cliente}"
      method="post">

    <input type="hidden" th:if = "*{id !=null}" th:field = "*{id}" />
    <p>Razão Social:
        <input class="form-control" type="text" th:field="*{nome}" required/>
        <span class="text-danger" th:errors="*{nome}"></span>
    </p>
     <div class="form-group">
    <label>CNPJ:</label>
    
    
    <input type="text" th:field="*{cnpj}" class="form-control" 
           data-mask="00.000.000/0000-00" th:errorclass="is-invalid" required/>
    <span th:errors="*{cnpj}" class="text-danger"></span>
      </div>
 

    <p>Telefone:
        <input class="form-control" type="text" th:field="*{telefone}" required/>
        <span class="text-danger" th:errors="*{telefone}"></span>
    </p>
  

    <p>Email:
        <input class="form-control" type="text" th:field="*{email}" required/>
        <span class="text-danger" th:errors="*{email}"></span>
        
    </p>

    <p>Endereço:
        <input class="form-control" type="text" th:field="*{endereco}" required/>
        <span class="text-danger" th:errors="*{endereco}"></span>
    </p>

    <p>
        <button class="btn btn-success" type="submit">Salvar</button>
        <a class="btn btn-secondary"th:href="@{/listar}">Voltar</a>
    </p>

</form>
<p id="resultado" th:if="${mensagem}" th:text="${mensagem}" class="alert alert-success"></p>
<script>
function toggleFields() {
    var tipo = document.querySelector('[name="tipo"]').value;
    document.querySelector('[name="cliente.id"]').parentElement.style.display = tipo === 'SAIDA' ? 'block' : 'none';
    // similar para fornecedor
}
</script>



</body>
</html>
